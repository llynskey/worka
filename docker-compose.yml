services:
  web:
    build:
      context: .
      dockerfile: Worka.WebApp/client/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: /api
    depends_on:
      - api
    ports:
      - "80:80"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Worka.WebApp/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      JwtSecret: ${JwtSecret:?Set JwtSecret in .env.production}
      ConnectionStrings__Postgres: ${ConnectionStrings__Postgres:?Set ConnectionStrings__Postgres in .env.production}
      Stripe__SecretKey: ${Stripe__SecretKey:-}
      Stripe__WebhookSecret: ${Stripe__WebhookSecret:-}
      Stripe__ConnectClientId: ${Stripe__ConnectClientId:-}
      Worka__ServiceFeePercent: ${Worka__ServiceFeePercent:-10}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

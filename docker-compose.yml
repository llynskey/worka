services:
  web:
    build:
      context: .
      dockerfile: Worka.WebApp/client/Dockerfile
      args:
        EXPO_PUBLIC_API_URL: /api
        EXPO_PUBLIC_MAPBOX_TOKEN: ${EXPO_PUBLIC_MAPBOX_TOKEN:-}
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    restart: unless-stopped
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  api:
    build:
      context: .
      dockerfile: Worka.WebApp/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      JwtSecret: ${JwtSecret:?Set JwtSecret in .env.production}
      ConnectionStrings__Postgres: ${ConnectionStrings__Postgres:?Set ConnectionStrings__Postgres in .env.production}
      Stripe__SecretKey: ${Stripe__SecretKey:-}
      Stripe__WebhookSecret: ${Stripe__WebhookSecret:-}
      Stripe__ConnectClientId: ${Stripe__ConnectClientId:-}
      Stripe__Currency: ${Stripe__Currency:-gbp}
      Stripe__DefaultCountry: ${Stripe__DefaultCountry:-GB}
      Worka__ServiceFeePercent: ${Worka__ServiceFeePercent:-10}
      Worka__ServiceFeeMinimum: ${Worka__ServiceFeeMinimum:-2}
      Worka__PublicUrl: ${Worka__PublicUrl:-https://woka.site}
      Smtp__Host: ${Smtp__Host:-}
      Smtp__Port: ${Smtp__Port:-587}
      Smtp__Username: ${Smtp__Username:-}
      Smtp__Password: ${Smtp__Password:-}
      Smtp__From: ${Smtp__From:-no-reply@woka.site}
      Smtp__UseSsl: ${Smtp__UseSsl:-true}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped
    volumes:
      - worka_uploads:/app/wwwroot/uploads

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env.production}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env.production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  worka_uploads:
  caddy_data:
  caddy_config:
